<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selamat Datang Alkasa Craft</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,600;1,700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #fbf9f1;
            background-image: 
                linear-gradient(rgba(230, 225, 212, 0.4) 1px, transparent 1px),
                linear-gradient(90deg, rgba(230, 225, 212, 0.4) 1px, transparent 1px);
            background-size: 20px 20px;
        }
        .font-serif-aesthetic {
            font-family: 'Playfair Display', serif;
        }
        .awning-top {
            background-image: radial-gradient(circle at 10px 0px, #db7282 12px, transparent 13px);
            background-size: 20px 20px;
        }
    </style>
</head>
<body class="min-h-screen relative flex items-center justify-center py-16 px-4 md:px-8 overflow-x-hidden">

    <!-- 1. AKSEN TENDA PINK ATAS -->
    <div class="absolute top-0 left-0 right-0 h-4 bg-[#b55263] z-20"></div>
    <div class="absolute top-4 left-0 right-0 h-5 awning-top z-20"></div>

    <!-- Hiasan Pemanis Sesuai Gambar -->
    <div class="absolute top-12 left-6 md:left-12 text-3xl select-none animate-bounce duration-1000">🎀</div>
    <div class="absolute bottom-12 left-1/2 transform -translate-x-1/2 text-2xl select-none animate-pulse">🎁</div>

    <!-- MAIN CONTAINER (DASHBOARD GRID) -->
    <div class="w-full max-w-5xl flex flex-col lg:flex-row items-center justify-between gap-12 mt-6 relative z-10">
        
        <!-- KIRI: BRANDING & WELCOME TEXT -->
        <div class="flex-1 flex flex-col items-center text-center space-y-6 max-w-md lg:max-w-xl">
            <div class="space-y-1">
                <h1 class="font-serif-aesthetic italic text-4xl md:text-5xl lg:text-6xl text-[#7d202e] tracking-wide">Selamat Datang</h1>
                <h2 class="font-serif-aesthetic italic text-4xl md:text-5xl lg:text-6xl text-[#7d202e] tracking-wide">Alkasa Craft</h2>
            </div>

            <!-- Frame Logo Berlapis Sesuai Gambar -->
            <div class="p-2 bg-[#7d202e] rounded-[36px] shadow-2xl transform transition-transform hover:scale-105 duration-300">
                <div class="p-2 bg-white rounded-[28px] border-4 border-[#e9a6b1]">
                    <img src="https://down-id.img.susercontent.com/file/id-11134004-7rbke-m7351hwyt8rrc5" 
                         alt="Alkasa Craft Logo" 
                         class="w-40 h-40 md:w-48 md:h-48 object-contain rounded-2xl">
                </div>
            </div>

            <p class="text-xs md:text-sm text-[#876e73] font-medium leading-relaxed px-6 max-w-md">
                Alhamdulillah ada pesanan, semoga semakin diberikan rezeki lebih banyak lagi dan cepat sukses. Aamiin
            </p>
        </div>

        <!-- KANAN: TOMBOL PILIHAN MENU/INPUT -->
        <div class="flex-1 w-full max-w-md space-y-5">
            
            <!-- Tombol 1: Input Pesanan Keluar -->
            <a href="https://alkasacraft.github.io/Input-Pesanan/" class="block bg-[#f2b5be] border-4 border-[#7d202e] rounded-[20px] p-2 shadow-lg transition-transform hover:scale-[1.02] active:scale-[0.99]">
                <div class="bg-white border-2 border-[#e9a6b1] rounded-[14px] py-4 text-center">
                    <span class="text-sm md:text-base font-bold text-[#8a3c49] tracking-wide">Input Pesanan Keluar</span>
                </div>
            </a>

            <!-- Tombol 2: Input Pesanan Masuk -->
            <a href="https://alkasacraft.github.io/Pesanan-Masuk/" class="block bg-[#f2b5be] border-4 border-[#7d202e] rounded-[20px] p-2 shadow-lg transition-transform hover:scale-[1.02] active:scale-[0.99]">
                <div class="bg-white border-2 border-[#e9a6b1] rounded-[14px] py-4 text-center">
                    <span class="text-sm md:text-base font-bold text-[#8a3c49] tracking-wide">Input Pesanan Masuk</span>
                </div>
            </a>

            <!-- Tombol 3: Keuangan Akomodasi -->
            <a href="keuangan.html" class="block bg-[#f2b5be] border-4 border-[#7d202e] rounded-[20px] p-2 shadow-lg transition-transform hover:scale-[1.02] active:scale-[0.99]">
                <div class="bg-white border-2 border-[#e9a6b1] rounded-[14px] py-4 text-center">
                    <span class="text-sm md:text-base font-bold text-[#8a3c49] tracking-wide">Keuangan Akomodasi</span>
                </div>
            </a>

            <!-- Tombol 4: Coming Soon -->
            <div class="bg-[#f2b5be] border-4 border-[#7d202e] rounded-[20px] p-2 shadow-lg opacity-75">
                <div class="bg-white border-2 border-[#e9a6b1] rounded-[14px] py-4 text-center select-none">
                    <span class="text-sm md:text-base font-bold text-[#8a3c49] tracking-wide">Coming Soon</span>
                </div>
            </div>

        </div>
    </div>

</body>
</html>
